name: Sync (delta, hourly)

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/sync.py --mode delta
      - name: Health check
        run: python scripts/sync.py --mode healthcheck
      - name: Commit & push
        run: |
          git config user.name "sgb-api-bridge-bot"
          git config user.email "noreply@github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "Degisiklik yok"
          else
            git commit -m "Delta sync $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
