# Otomatik lookup'lar - tum sourcetype'larda src/dest IP, query, URL alanlarini
# SGB indicator'larina karsi zenginlestir. Kapsam genis tutuldu (default: tum
# sourcetype'lar); ortaminizda kapsami daraltmak isterseniz [sourcetype::...]
# basliklari ile override edin.
#
# Cikti alanlari: sgb_<src|dest|query|url>_<ct|desc|crit|src>.

[default]
# Source IP -> SGB IP intel
LOOKUP-sgb_src_ip = sgb_ip_lookup value AS src_ip OUTPUTNEW \
    connectiontype AS sgb_src_ct \
    description AS sgb_src_desc \
    criticality_level AS sgb_src_crit \
    source AS sgb_src_source \
    first_seen_utc AS sgb_src_first_seen

# Destination IP
LOOKUP-sgb_dest_ip = sgb_ip_lookup value AS dest_ip OUTPUTNEW \
    connectiontype AS sgb_dest_ct \
    description AS sgb_dest_desc \
    criticality_level AS sgb_dest_crit \
    source AS sgb_dest_source \
    first_seen_utc AS sgb_dest_first_seen

# DNS query (Splunk CIM: query field)
LOOKUP-sgb_dns_query = sgb_domain_lookup value AS query OUTPUTNEW \
    connectiontype AS sgb_query_ct \
    description AS sgb_query_desc \
    criticality_level AS sgb_query_crit \
    source AS sgb_query_source \
    first_seen_utc AS sgb_query_first_seen

# HTTP URL (proxy/web logs)
LOOKUP-sgb_url = sgb_url_lookup value AS url OUTPUTNEW \
    connectiontype AS sgb_url_ct \
    description AS sgb_url_desc \
    criticality_level AS sgb_url_crit \
    source AS sgb_url_source \
    first_seen_utc AS sgb_url_first_seen
