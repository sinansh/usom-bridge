###############################################################################
# SGB Threat Intel - macros
#   - Eval helper'lar:  sgb_severity, sgb_trusted_source
#   - Search makrolari: sgb_dns_phishing_search, sgb_botnet_outbound_search,
#                       sgb_apt_anywhere_search
###############################################################################

#--- Eval helpers ------------------------------------------------------------

# CT x criticality -> 1-10 severity. severity-matrix.md ile uyumlu.
[sgb_severity(2)]
args = ct, crit
definition = case(\
    $ct$="AC", 10, \
    $ct$="BC", min(10, 8 + round(($crit$-5)/2)), \
    $ct$="EK", min(10, 8 + round(($crit$-5)/2)), \
    $ct$="MF", min(10, 7 + round(($crit$-5)/2)), \
    $ct$="MC", min(10, 7 + round(($crit$-5)/2)), \
    $ct$="PH", min(10, 5 + round(($crit$-5)/2)), \
    $ct$="MM", max(1, 3 + round(($crit$-5)/2)), \
    1=1, max(1, 3 + round(($crit$-5)/2)))
iseval = 1

# Guvenilir kaynak filtresi (IH'yi disla, FP azalt).
[sgb_trusted_source(1)]
args = src
definition = $src$ IN ("US","SB","SO","RS")
iseval = 1

#--- Use case search'leri ----------------------------------------------------

[sgb_dns_phishing_search]
definition = sourcetype=dns OR sourcetype=stream:dns OR tag=dns \
    | lookup sgb_domain_lookup value AS query OUTPUT connectiontype description criticality_level source \
    | where connectiontype="PH" AND `sgb_trusted_source(source)` \
    | eval severity=`sgb_severity(connectiontype, criticality_level)` \
    | table _time src_ip query connectiontype description criticality_level source severity

[sgb_botnet_outbound_search]
definition = (sourcetype=pan:traffic OR sourcetype=cisco:asa OR sourcetype=fortigate OR tag=network_traffic) \
    | lookup sgb_ip_lookup value AS dest_ip OUTPUT connectiontype description criticality_level source \
    | where connectiontype="BC" \
    | eval severity=`sgb_severity(connectiontype, criticality_level)` \
    | stats count by src_ip dest_ip connectiontype description criticality_level source severity

# APT match: kucuk indicator listesi oldugu icin inputlookup join paterni daha hizli.
[sgb_apt_anywhere_search]
definition = (   [| inputlookup sgb_ip_lookup     where connectiontype="AC" | fields value | rename value AS dest_ip] \
              OR [| inputlookup sgb_domain_lookup where connectiontype="AC" | fields value | rename value AS query] \
              OR [| inputlookup sgb_url_lookup    where connectiontype="AC" | fields value | rename value AS url]) \
    | eval severity=10, sgb_match_type=case(isnotnull(dest_ip),"ip", isnotnull(query),"domain", isnotnull(url),"url") \
    | table _time src_ip sgb_match_type dest_ip query url sourcetype severity
