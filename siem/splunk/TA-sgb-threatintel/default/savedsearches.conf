# SGB use case alarmlari. QRadar UC-* rule'lari ile 1:1 esitlik.
# Bu search'ler enable_sched=1 ile gelir; ilk kurulumda *pasif* tutmak isterseniz
# local/savedsearches.conf'ta enableSched=0 ile override edin.

#=============================================================================
# UC-PH-001 - SGB Phishing DNS query
#=============================================================================
[SGB - UC-PH-001 - Phishing DNS query]
description = Internal host queried an SGB phishing domain.
search = `sgb_dns_phishing_search`
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.fields = src_ip,query
alert.suppress.period = 1h
action.email = 0
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events

#=============================================================================
# UC-BC-001 - SGB Botnet C&C outbound
#=============================================================================
[SGB - UC-BC-001 - Botnet C2 outbound]
description = Internal host connected to an SGB-listed botnet C&C IP.
search = `sgb_botnet_outbound_search`
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 5
alert.suppress = 1
alert.suppress.fields = src_ip,dest_ip
alert.suppress.period = 30m
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events

#=============================================================================
# UC-AC-001 - SGB APT C&C any direction
#=============================================================================
[SGB - UC-AC-001 - APT C2 match (any)]
description = Any indicator marked APT C&C matched in any log source. P1.
search = `sgb_apt_anywhere_search`
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 6
alert.suppress = 0
action.email = 1
action.email.to = soc-oncall@kurum.local
action.email.subject = [SGB P1] APT C2 indicator match
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
